"$schema" = 'https://starship.rs/config-schema.json'

format = """
[➜](bold green) $directory$git_branch$git_status
"""

add_newline = false

[directory]
style = "bold cyan"
truncation_length = 1
truncate_to_repo = false
read_only = " -"

[git_branch]
format = "[$branch]($style) "
style = "blue"

[git_status]
format = "([✗]($style) )"
style = "bold red"
disabled = false
stashed = ""
ahead = ""
behind = ""
diverged = ""
renamed = ""
deleted = ""
untracked = "✗"
modified = "✗"
staged = "✗"
conflicted = "✗"

[nodejs]
disabled = true

[package]
disabled = true
